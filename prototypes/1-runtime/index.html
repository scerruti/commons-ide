<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Prototype 1 for Commons IDE: Google Apps Script + Pyodide runtime smoke test." />
    <title>Commons IDE — P1</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      #status {
        font-size: 14px;
        opacity: 0.85;
      }
      #modeBadge {
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid #8886;
        border-radius: 999px;
        opacity: 0.9;
      }
      #modeHelp {
        margin: 0 0 12px;
        font-size: 13px;
        opacity: 0.8;
      }
      #output {
        border: 1px solid #8884;
        border-radius: 8px;
        padding: 12px;
        min-height: 100px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #8886;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Commons IDE — Prototype 1</h1>
    <div class="row">
      <span id="modeBadge">Mode: loading…</span>
      <button id="runBtn" type="button" disabled>Run print('hello')</button>
      <button id="turtleBtn" type="button" disabled>Run Turtle square</button>
      <button id="pygameBtn" type="button" disabled>Run Pygame frame</button>
      <span id="status">Loading Pyodide…</span>
    </div>
    <p id="modeHelp"></p>
    <div id="output" aria-live="polite"></div>
    <div id="turtleContainer" style="display:none;margin-top:12px;border:1px solid #8884;border-radius:8px;background:#fff;width:640px;height:360px;overflow:hidden"></div>
    <canvas id="outputCanvas" width="640" height="360" style="margin-top:12px;border:1px solid #8884;border-radius:8px;background:#fff"></canvas>

    <script>
      let pyodide;
      let pyodideReady = false;
      let skulptReady = false;

      const outputEl = document.getElementById('output');
      const statusEl = document.getElementById('status');
      const modeBadgeEl = document.getElementById('modeBadge');
      const modeHelpEl = document.getElementById('modeHelp');
      const runBtn = document.getElementById('runBtn');
      const turtleBtn = document.getElementById('turtleBtn');
      const pygameBtn = document.getElementById('pygameBtn');
      const turtleContainerEl = document.getElementById('turtleContainer');
      const outputCanvasEl = document.getElementById('outputCanvas');
      const serverMode = '<?= serverMode ?>';

      function getAssignmentMode() {
        const mode = (serverMode || new URLSearchParams(window.location.search).get('mode') || '').toLowerCase();
        if (mode === 'text' || mode === 'text-advanced' || mode === 'graphics' || mode === 'game') {
          return mode;
        }
        return 'graphics';
      }

      const assignmentMode = getAssignmentMode();

      function setVisible(el, visible) {
        el.style.display = visible ? '' : 'none';
      }

      function applyAssignmentMode(mode) {
        modeBadgeEl.textContent = `Mode: ${mode}`;

        if (mode === 'text') {
          modeHelpEl.textContent = 'Text mode (fast): Skulpt runtime, output panel only, limited imports.';
          setVisible(runBtn, true);
          setVisible(turtleBtn, false);
          setVisible(pygameBtn, false);
          setVisible(turtleContainerEl, false);
          setVisible(outputCanvasEl, false);
          return;
        }

        if (mode === 'text-advanced') {
          modeHelpEl.textContent = 'Advanced text mode: Pyodide runtime, broader Python package support.';
          setVisible(runBtn, true);
          setVisible(turtleBtn, false);
          setVisible(pygameBtn, false);
          setVisible(turtleContainerEl, false);
          setVisible(outputCanvasEl, false);
          return;
        }

        if (mode === 'graphics') {
          modeHelpEl.textContent = 'Graphics mode: Skulpt turtle canvas enabled.';
          setVisible(runBtn, false);
          setVisible(turtleBtn, true);
          setVisible(pygameBtn, false);
          setVisible(turtleContainerEl, true);
          setVisible(outputCanvasEl, false);
          turtleContainerEl.style.width = '640px';
          turtleContainerEl.style.height = '360px';
          return;
        }

        modeHelpEl.textContent = 'Game mode (experimental): pygame test enabled; runtime may fail by host.';
  setVisible(runBtn, false);
        setVisible(turtleBtn, false);
        setVisible(pygameBtn, true);
        setVisible(turtleContainerEl, false);
        setVisible(outputCanvasEl, true);
        outputCanvasEl.width = 800;
        outputCanvasEl.height = 450;
      }

      applyAssignmentMode(assignmentMode);

      function appendOutput(text) {
        outputEl.textContent += text;
      }

      function clearOutput() {
        outputEl.textContent = '';
      }

      function scriptTagId(url) {
        return `script-${btoa(url).replace(/=/g, '')}`;
      }

      function loadScriptOnce(url) {
        return new Promise((resolve, reject) => {
          const existing = document.getElementById(scriptTagId(url));
          if (existing) {
            if (existing.dataset.loaded === 'true') {
              resolve();
              return;
            }
            existing.addEventListener('load', () => resolve(), { once: true });
            existing.addEventListener('error', () => reject(new Error(`Failed to load ${url}`)), { once: true });
            return;
          }

          const script = document.createElement('script');
          script.id = scriptTagId(url);
          script.src = url;
          script.async = true;
          script.onload = () => {
            script.dataset.loaded = 'true';
            resolve();
          };
          script.onerror = () => reject(new Error(`Failed to load ${url}`));
          document.head.appendChild(script);
        });
      }

      async function initSkulpt() {
        if (skulptReady) {
          return;
        }
        statusEl.textContent = 'Loading Skulpt…';
        await loadScriptOnce('https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js');
        await loadScriptOnce('https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js');
        skulptReady = true;
      }

      async function initPyodideRuntime() {
        if (pyodideReady) {
          return;
        }
        statusEl.textContent = 'Loading Pyodide…';
        await loadScriptOnce('https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js');
        pyodide = await loadPyodide();
        pyodide.setStdout({
          batched: (msg) => appendOutput(msg + '\n')
        });
        pyodide.setStderr({
          batched: (msg) => appendOutput(msg + '\n')
        });
        pyodideReady = true;
      }

      async function init() {
        try {
          if (assignmentMode === 'text' || assignmentMode === 'graphics') {
            await initSkulpt();
            statusEl.textContent = 'Skulpt loaded.';
            runBtn.disabled = assignmentMode !== 'text';
            turtleBtn.disabled = assignmentMode !== 'graphics';
            pygameBtn.disabled = true;
          } else {
            await initPyodideRuntime();
            statusEl.textContent = 'Pyodide loaded.';
            runBtn.disabled = assignmentMode !== 'text-advanced';
            turtleBtn.disabled = true;
            pygameBtn.disabled = assignmentMode !== 'game';
          }
        } catch (err) {
          statusEl.textContent = 'Runtime load failed.';
          appendOutput((err && err.message) ? err.message + '\n' : String(err) + '\n');
        }
      }

      async function runPython(label, code) {
        clearOutput();
        statusEl.textContent = label;
        try {
          if (!pyodideReady) {
            await initPyodideRuntime();
          }
          await pyodide.runPythonAsync(code);
          statusEl.textContent = 'Done.';
        } catch (err) {
          statusEl.textContent = 'Python error.';
          appendOutput((err && err.message) ? err.message + '\n' : String(err) + '\n');
        }
      }

      function skulptRead(filename) {
        if (!window.Sk || !Sk.builtinFiles || !Sk.builtinFiles.files[filename]) {
          throw new Error(`Skulpt stdlib missing: ${filename}`);
        }
        return Sk.builtinFiles.files[filename];
      }

      async function runSkulpt(label, code, enableTurtle = false) {
        clearOutput();
        statusEl.textContent = label;
        try {
          if (!skulptReady) {
            await initSkulpt();
          }
          Sk.pre = 'output';
          Sk.configure({
            output: (text) => appendOutput(text),
            read: skulptRead,
            __future__: Sk.python3
          });
          if (enableTurtle) {
            turtleContainerEl.innerHTML = '';
            Sk.TurtleGraphics = {
              target: 'turtleContainer',
              width: 640,
              height: 360
            };
          }
          appendOutput('skulpt-run-start\n');
          await Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true));
          appendOutput('skulpt-run-end\n');
          statusEl.textContent = 'Done.';
        } catch (err) {
          statusEl.textContent = 'Python error.';
          appendOutput((err && err.toString) ? err.toString() + '\n' : String(err) + '\n');
        }
      }

      function normalizePython(text) {
        return text
          .replace(/^\n/, '')
          .replace(/^ {4}/gm, '');
      }

      runBtn.addEventListener('click', async () => {
        if (assignmentMode === 'text') {
          await runSkulpt('Running Python…', "print('hello from skulpt')");
          return;
        }
        await runPython('Running Python…', "import math\nprint('hello from pyodide')\nprint(math.sqrt(144))");
      });

      turtleBtn.addEventListener('click', async () => {
        await runSkulpt(
          'Running Turtle…',
          normalizePython(`
            print('turtle-start')
    import turtle
    t = turtle.Turtle()
    t.speed(0)
    t.pensize(4)
    t.pencolor('#0b7285')
    for _ in range(4):
      t.forward(100)
      t.right(90)
    turtle.done()
    print('turtle-done')`),
          true
        );
      });

      pygameBtn.addEventListener('click', async () => {
        statusEl.textContent = 'Loading micropip…';
        try {
          if (!pyodideReady) {
            await initPyodideRuntime();
          }
          await pyodide.loadPackage('micropip');
        } catch (err) {
          statusEl.textContent = 'Package load error.';
          appendOutput((err && err.message) ? err.message + '\n' : String(err) + '\n');
          return;
        }

        await runPython(
          'Running Pygame…',
    normalizePython(`
    import os
    os.environ['PYGAME_HIDE_SUPPORT_PROMPT'] = '1'
    os.environ['SDL_VIDEODRIVER'] = 'emscripten'

    import micropip
    await micropip.install("pygame-ce")

    import asyncio
    import traceback
    import pygame
    print('pygame-import-ok')
    pygame.init()
    print('pygame-init-ok')
    try:
      screen = pygame.display.set_mode((400, 300))
    except Exception as e:
      print('display-mode-failed')
      print(repr(e))
      traceback.print_exc()
      raise
    print('display-mode-ok')
    screen.fill((0, 128, 255))
    pygame.display.flip()
    await asyncio.sleep(0.25)
    print('pygame-done')`)
        );
      });

      init();
    </script>
  </body>
</html>
