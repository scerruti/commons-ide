<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Prototype 1 for Commons IDE: Google Apps Script + Pyodide runtime smoke test." />
    <title>Commons IDE — P1</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      #status {
        font-size: 14px;
        opacity: 0.85;
      }
      #output {
        border: 1px solid #8884;
        border-radius: 8px;
        padding: 12px;
        min-height: 100px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #8886;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Commons IDE — Prototype 1</h1>
    <div class="row">
      <button id="runBtn" type="button" disabled>Run print('hello')</button>
      <button id="turtleBtn" type="button" disabled>Run Turtle square</button>
      <span id="status">Loading Pyodide…</span>
    </div>
    <div id="output" aria-live="polite"></div>
    <canvas id="outputCanvas" width="640" height="360" style="margin-top:12px;border:1px solid #8884;border-radius:8px;background:#fff"></canvas>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
    <script>
      let pyodide;

      const outputEl = document.getElementById('output');
      const statusEl = document.getElementById('status');
      const runBtn = document.getElementById('runBtn');
      const turtleBtn = document.getElementById('turtleBtn');

      function appendOutput(text) {
        outputEl.textContent += text;
      }

      async function init() {
        try {
          pyodide = await loadPyodide();
          pyodide.setStdout({
            batched: (msg) => appendOutput(msg + '\n')
          });
          statusEl.textContent = 'Pyodide loaded.';
          runBtn.disabled = false;
          turtleBtn.disabled = false;
        } catch (err) {
          statusEl.textContent = 'Failed to load Pyodide.';
          appendOutput((err && err.message) ? err.message + '\n' : String(err) + '\n');
        }
      }

      async function runPython(label, code) {
        outputEl.textContent = '';
        statusEl.textContent = label;
        try {
          await pyodide.runPythonAsync(code);
          statusEl.textContent = 'Done.';
        } catch (err) {
          statusEl.textContent = 'Python error.';
          appendOutput((err && err.message) ? err.message + '\n' : String(err) + '\n');
        }
      }

      function normalizePython(text) {
        return text
          .replace(/^\n/, '')
          .replace(/^ {4}/gm, '');
      }

      runBtn.addEventListener('click', async () => {
        await runPython('Running Python…', "print('hello')");
      });

      turtleBtn.addEventListener('click', async () => {
        await runPython(
          'Running Turtle…',
    normalizePython(`
    import sys
    import types
    import math
    from js import document

    def install_turtle_shim():
      if 'turtle' in sys.modules:
        return

      canvas = document.getElementById('outputCanvas')
      if canvas is None:
        raise RuntimeError('outputCanvas not found')
      ctx = canvas.getContext('2d')

      def clear(bg='#ffffff'):
        ctx.fillStyle = bg
        ctx.fillRect(0, 0, canvas.width, canvas.height)

      clear()

      def to_canvas_coords(x, y):
        return canvas.width / 2 + x, canvas.height / 2 - y

      class _Screen:
        def bgcolor(self, color):
          clear(color)

      class Turtle:
        def __init__(self):
          self.x = 0.0
          self.y = 0.0
          self.heading = 0.0
          self.isdown = True
          self.pencolor = '#0b7285'
          self.pensize_value = 3

        def _draw_to(self, nx, ny):
          if self.isdown:
            x1, y1 = to_canvas_coords(self.x, self.y)
            x2, y2 = to_canvas_coords(nx, ny)
            ctx.beginPath()
            ctx.strokeStyle = self.pencolor
            ctx.lineWidth = self.pensize_value
            ctx.moveTo(x1, y1)
            ctx.lineTo(x2, y2)
            ctx.stroke()
          self.x, self.y = nx, ny

        def forward(self, dist):
          rad = math.radians(self.heading)
          nx = self.x + dist * math.cos(rad)
          ny = self.y + dist * math.sin(rad)
          self._draw_to(nx, ny)

        def right(self, angle):
          self.heading -= angle

        def left(self, angle):
          self.heading += angle

        def penup(self):
          self.isdown = False

        def pendown(self):
          self.isdown = True

        def goto(self, x, y):
          self._draw_to(float(x), float(y))

        def color(self, color):
          self.pencolor = color

        def width(self, w):
          self.pensize_value = float(w)

        def pensize(self, w=None):
          if w is None:
            return self.pensize_value
          self.pensize_value = float(w)

        def speed(self, *_):
          return None

      mod = types.ModuleType('turtle')
      mod.Turtle = Turtle
      mod.Screen = _Screen
      mod.done = lambda: None
      mod.clearscreen = clear
      sys.modules['turtle'] = mod

    install_turtle_shim()

    import turtle
    t = turtle.Turtle()
    for _ in range(4):
      t.forward(100)
      t.right(90)
    print('turtle-done')`)
        );
      });

      init();
    </script>
  </body>
</html>
